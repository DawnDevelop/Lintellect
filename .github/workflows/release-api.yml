name: Release API

on:
  workflow_dispatch:
  push:
    tags:
      - "api/v*"
      - "api-v*"

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lintellect-api
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      major: ${{ steps.extract.outputs.major }}
      minor: ${{ steps.extract.outputs.minor }}
      patch: ${{ steps.extract.outputs.patch }}

    steps:
      - name: Extract version from tag
        id: extract
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/api/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/api-v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Invalid tag format"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract major, minor, patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

          echo "Extracted version: $VERSION"
          echo "Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: extract-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build API
        run: dotnet build src/Lintellect.Api/Lintellect.Api.csproj --no-restore --configuration Release

      - name: Build API unit tests
        run: dotnet build tests/Lintellect.Api.UnitTests/Lintellect.Api.UnitTests.csproj --no-restore --configuration Release

      - name: Run API unit tests
        run: dotnet test tests/Lintellect.Api.UnitTests/Lintellect.Api.UnitTests.csproj --no-build --configuration Release --verbosity normal

      - name: Build API functional tests
        run: dotnet build tests/Lintellect.Api.FunctionalTests/Lintellect.Api.FunctionalTests.csproj --no-restore --configuration Release

      - name: Run API functional tests
        run: dotnet test tests/Lintellect.Api.FunctionalTests/Lintellect.Api.FunctionalTests.csproj --no-build --configuration Release --verbosity normal

      - name: Verify version in project file
        run: |
          VERSION_IN_FILE=$(grep -oP '<Version>\K[^<]+' src/Lintellect.Api/Lintellect.Api.csproj)
          if [ "$VERSION_IN_FILE" != "${{ needs.extract-version.outputs.version }}" ]; then
            echo "Version mismatch: project file has $VERSION_IN_FILE, tag has ${{ needs.extract-version.outputs.version }}"
            exit 1
          fi
          echo "Version verification passed: $VERSION_IN_FILE"

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [extract-version, build-and-test]
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.extract-version.outputs.version }}
            type=raw,value=${{ needs.extract-version.outputs.major }}
            type=raw,value=${{ needs.extract-version.outputs.major }}.${{ needs.extract-version.outputs.minor }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Lintellect.Api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_CONFIGURATION=Release

  build-binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    needs: [extract-version, build-and-test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux-x64
            extension: tar.gz
          - os: windows-latest
            platform: win-x64
            extension: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish API
        run: |
          dotnet publish src/Lintellect.Api/Lintellect.Api.csproj --configuration Release --runtime ${{ matrix.platform }} --self-contained true --output ./publish/api --force /p:UseAppHost=true

      - name: Create binary archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "./publish/api" -DestinationPath "./lintellect-api-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}.${{ matrix.extension }}"

      - name: Create binary archive (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "./lintellect-api-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}.${{ matrix.extension }}" -C ./publish/api .

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: lintellect-api-${{ matrix.platform }}
          path: ./lintellect-api-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}.${{ matrix.extension }}
          retention-days: 30

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [extract-version, build-docker-images, build-binaries]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all binaries
        uses: actions/download-artifact@v6
        with:
          path: ./binaries
          pattern: lintellect-api-*
          merge-multiple: false

      - name: Create release with GitHub CLI
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Lintellect API v${{ needs.extract-version.outputs.version }}" \
            ./binaries/lintellect-api-linux-x64/lintellect-api-${{ needs.extract-version.outputs.version }}-linux-x64.tar.gz \
            ./binaries/lintellect-api-win-x64/lintellect-api-${{ needs.extract-version.outputs.version }}-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-completion:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [extract-version, create-release]
    if: always()

    steps:
      - name: Notify success
        if: needs.create-release.result == 'success'
        run: |
          echo "✅ API v${{ needs.extract-version.outputs.version }} released successfully!"
          echo "🐳 Docker images pushed to GitHub Container Registry"
          echo "📦 Binary archives attached to GitHub Release"

      - name: Notify failure
        if: needs.create-release.result == 'failure'
        run: |
          echo "❌ API v${{ needs.extract-version.outputs.version }} release failed!"
          echo "Please check the logs and retry the release process."
          exit 1
