name: Main Branch Build

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/dependency-update.yml"

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lintellect-api

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build all projects
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName!~FunctionalTests"

      - name: Build functional tests
        run: dotnet build tests/Lintellect.Api.FunctionalTests/Lintellect.Api.FunctionalTests.csproj --no-restore --configuration Release

      - name: Run functional tests
        run: dotnet test tests/Lintellect.Api.FunctionalTests/Lintellect.Api.FunctionalTests.csproj --no-build --configuration Release --verbosity normal

      - name: Run code analysis
        run: |
          dotnet build --no-restore --configuration Release --verbosity normal /p:RunAnalyzersDuringBuild=true /p:EnableNETAnalyzers=true

      - name: Check code formatting
        run: |
          dotnet format --verify-no-changes --verbosity diagnostic

  build-cli-package:
    name: Build CLI Package
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build CLI
        run: dotnet build src/Lintellect.Cli/Lintellect.Cli.csproj --no-restore --configuration Release

      - name: Pack CLI
        run: dotnet pack src/Lintellect.Cli/Lintellect.Cli.csproj --no-build --configuration Release --output ./packages

      - name: Upload CLI package
        uses: actions/upload-artifact@v5
        with:
          name: cli-package-main
          path: ./packages
          retention-days: 7

  build-api-docker:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=edge
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Lintellect.Api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_CONFIGURATION=Release

  build-cli-binaries:
    name: Build CLI Binaries
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux-x64
            extension: tar.gz
          - os: windows-latest
            platform: win-x64
            extension: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish CLI
        run: dotnet publish src/Lintellect.Cli/Lintellect.Cli.csproj --configuration Release --runtime ${{ matrix.platform }} --self-contained true --output ./publish/cli --force

      - name: Create binary archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "./publish/cli" -DestinationPath "./lintellect-cli-main-${{ matrix.platform }}.${{ matrix.extension }}"

      - name: Create binary archive (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "./lintellect-cli-main-${{ matrix.platform }}.${{ matrix.extension }}" -C ./publish/cli .

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: cli-binary-${{ matrix.platform }}
          path: ./lintellect-cli-main-${{ matrix.platform }}.${{ matrix.extension }}
          retention-days: 7

  success-notification:
    name: Success Notification
    runs-on: ubuntu-latest
    needs:
      [build-and-test, build-cli-package, build-api-docker, build-cli-binaries]
    if: always()

    steps:
      - name: Notify success
        if: needs.build-and-test.result == 'success' && needs.build-cli-package.result == 'success' && needs.build-api-docker.result == 'success'
        run: |
          echo "✅ Main branch build completed successfully!"
          echo "🏗️ All projects built and tested"
          echo "📦 CLI package built and uploaded"
          echo "🐳 API Docker image pushed to registry"
          echo "📦 CLI binaries built for all platforms"
          echo ""
          echo "Main branch is ready for development and releases!"

      - name: Notify failure
        if: needs.build-and-test.result == 'failure' || needs.build-cli-package.result == 'failure' || needs.build-api-docker.result == 'failure'
        run: |
          echo "❌ Main branch build failed!"
          echo "Please check the logs and fix the issues."
          exit 1
