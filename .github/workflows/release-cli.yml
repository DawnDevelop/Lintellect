name: Release CLI

on:
  push:
    tags:
      - "cli/v*"
      - "cli-v*"

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      major: ${{ steps.extract.outputs.major }}
      minor: ${{ steps.extract.outputs.minor }}
      patch: ${{ steps.extract.outputs.patch }}

    steps:
      - name: Extract version from tag
        id: extract
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/cli/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/cli-v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Invalid tag format"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract major, minor, patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

          echo "Extracted version: $VERSION"
          echo "Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: extract-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build CLI
        run: dotnet build src/Lintellect.Cli/Lintellect.Cli.csproj --no-restore --configuration Release

      - name: Run CLI tests
        run: dotnet test tests/Lintellect.Cli.UnitTests/Lintellect.Cli.UnitTests.csproj --no-build --configuration Release --verbosity normal

      - name: Verify version in project file
        run: |
          VERSION_IN_FILE=$(grep -oP '<Version>\K[^<]+' src/Lintellect.Cli/Lintellect.Cli.csproj)
          PACKAGE_VERSION_IN_FILE=$(grep -oP '<PackageVersion>\K[^<]+' src/Lintellect.Cli/Lintellect.Cli.csproj)

          if [ "$VERSION_IN_FILE" != "${{ needs.extract-version.outputs.version }}" ]; then
            echo "Version mismatch: project file has $VERSION_IN_FILE, tag has ${{ needs.extract-version.outputs.version }}"
            exit 1
          fi

          if [ "$PACKAGE_VERSION_IN_FILE" != "${{ needs.extract-version.outputs.version }}" ]; then
            echo "PackageVersion mismatch: project file has $PACKAGE_VERSION_IN_FILE, tag has ${{ needs.extract-version.outputs.version }}"
            exit 1
          fi

          echo "Version verification passed: $VERSION_IN_FILE"

  build-nuget-package:
    name: Build NuGet Package
    runs-on: ubuntu-latest
    needs: [extract-version, build-and-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack CLI
        run: dotnet pack src/Lintellect.Cli/Lintellect.Cli.csproj --no-build --configuration Release --output ./packages

      - name: Upload NuGet package
        uses: actions/upload-artifact@v5
        with:
          name: nuget-package
          path: ./packages
          retention-days: 30

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [extract-version, build-nuget-package]

    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v6
        with:
          name: nuget-package
          path: ./packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./packages/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  build-binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    needs: [extract-version, build-and-test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux-x64
            extension: tar.gz
            executable: lintellect
          - os: windows-latest
            platform: win-x64
            extension: zip
            executable: lintellect.exe
          - os: macos-latest
            platform: osx-x64
            extension: tar.gz
            executable: lintellect

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish CLI
        run: |
          dotnet publish src/Lintellect.Cli/Lintellect.Cli.csproj \
            --configuration Release \
            --runtime ${{ matrix.platform }} \
            --self-contained true \
            --output ./publish/cli

      - name: Create binary archive
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Create a directory structure for the archive
            mkdir -p ./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}
            cp -r ./publish/cli/* ./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}/
            Compress-Archive -Path "./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}" -DestinationPath "./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}.${{ matrix.extension }}"
          else
            # Create a directory structure for the archive
            mkdir -p ./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}
            cp -r ./publish/cli/* ./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}/
            tar -czf "./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}.${{ matrix.extension }}" -C ./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }} .
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: lintellect-cli-${{ matrix.platform }}
          path: ./lintellect-cli-${{ needs.extract-version.outputs.version }}-${{ matrix.platform }}.${{ matrix.extension }}
          retention-days: 30

  generate-release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    needs: [extract-version]
    outputs:
      release-notes: ${{ steps.notes.outputs.release-notes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          # Extract CLI section from CHANGELOG.md
          VERSION="${{ needs.extract-version.outputs.version }}"

          # Find the CLI section for this version
          CLI_SECTION=$(awk "/## \[CLI v$VERSION\]/,/^## \[/ {if (!/^## \[/) print}" CHANGELOG.md)

          if [ -z "$CLI_SECTION" ]; then
            echo "No CLI section found for version $VERSION in CHANGELOG.md"
            CLI_SECTION="## CLI v$VERSION\n\nNo release notes available."
          fi

          # Create release notes
          RELEASE_NOTES="## Lintellect CLI v$VERSION\n\n$CLI_SECTION\n\n### Installation\n\n#### NuGet Package\n\n\`\`\`bash\n# Install globally\ndotnet tool install --global lintellect --version $VERSION\n\n# Verify installation\nlintellect --version\n\`\`\`\n\n#### Binary Downloads\n\n- **Linux x64**: \`lintellect-cli-$VERSION-linux-x64.tar.gz\`\n- **Windows x64**: \`lintellect-cli-$VERSION-win-x64.zip\`\n- **macOS x64**: \`lintellect-cli-$VERSION-osx-x64.tar.gz\`\n\n### Usage\n\n\`\`\`bash\n# Basic analysis\nlintellect analyze --solution ./MyProject.sln\n\n# With API integration\nlintellect analyze \\\n  --solution ./MyProject.sln \\\n  --api-url \"https://api.example.com\" \\\n  --api-key \"your-api-key\"\n\`\`\`"

          echo "release-notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      [extract-version, publish-nuget, build-binaries, generate-release-notes]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all binaries
        uses: actions/download-artifact@v6
        with:
          path: ./binaries

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Lintellect CLI v${{ needs.extract-version.outputs.version }}
          body: ${{ needs.generate-release-notes.outputs.release-notes }}
          files: |
            ./binaries/lintellect-cli-linux-x64/lintellect-cli-${{ needs.extract-version.outputs.version }}-linux-x64.tar.gz
            ./binaries/lintellect-cli-win-x64/lintellect-cli-${{ needs.extract-version.outputs.version }}-win-x64.zip
            ./binaries/lintellect-cli-osx-x64/lintellect-cli-${{ needs.extract-version.outputs.version }}-osx-x64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-completion:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [extract-version, create-release, publish-nuget]
    if: always()

    steps:
      - name: Notify success
        if: needs.create-release.result == 'success' && needs.publish-nuget.result == 'success'
        run: |
          echo "✅ CLI v${{ needs.extract-version.outputs.version }} released successfully!"
          echo "📦 NuGet package published to NuGet.org"
          echo "📦 Binary archives attached to GitHub Release"
          echo "📝 Release notes published"

      - name: Notify failure
        if: needs.create-release.result == 'failure' || needs.publish-nuget.result == 'failure'
        run: |
          echo "❌ CLI v${{ needs.extract-version.outputs.version }} release failed!"
          echo "Please check the logs and retry the release process."
          exit 1
