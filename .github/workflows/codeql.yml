name: CodeQL Analysis

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1" # Weekly on Monday at 2 AM UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["csharp"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build projects
        run: |
          dotnet build src/Lintellect.Api/Lintellect.Api.csproj --configuration Release --no-restore
          dotnet build src/Lintellect.Cli/Lintellect.Cli.csproj --configuration Release --no-restore
          dotnet build src/Lintellect.Shared/Lintellect.Shared.csproj --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  #dependency-review:
  #  name: Dependency Review
  #  runs-on: ubuntu-latest
  #  if: github.event_name == 'pull_request'
  #
  #  steps:
  #    - name: Checkout repository
  #      uses: actions/checkout@v5
  #
  #    - name: Dependency Review
  #      uses: actions/dependency-review-action@v4
  #      with:
  #        fail-on-severity: moderate
  #        allow-licenses: MIT, Apache-2.0, AGPL-3.0, BSD-2-Clause, BSD-3-Clause, ISC, Unlicense

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.92.4
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified
